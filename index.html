<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#f8f4f3;
    font-family:'Playfair Display', serif;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:50px 30px 70px;
    text-align:center;
}

h1{
    font-size:3rem;
    font-weight:700;
    color:#111;
    margin-bottom:20px;
    line-height:1.2;
}

.subtitle{
    color:#c16b6b;
    font-style:italic;
    font-size:1.1rem;
    letter-spacing:3px;
    margin-bottom:45px;
}

h2{
    font-size:2.2rem;
    font-weight:700;
    color:#111;
    margin-bottom:20px;
}

.divider{
    width:70px;
    height:2px;
    background:#d6a3a3;
    margin:0 auto 55px;
}

.aromas{
    display:flex;
    justify-content:center;
    gap:55px;
    flex-wrap:wrap;
}

.item{
    width:160px;
}

.item img{
    width:140px;
    height:140px;
    object-fit:contain;
}

.item p{
    margin-top:15px;
    color:#c16b6b;
    font-size:1.5rem;
    font-style:italic;
}

</style>
</head>
<body>

<div class="container">

    <h1>Top 5 notas aromáticas más frecuentes en vinos argentinos</h1>

    <div class="subtitle">
        lo que encontrarás en la copa
    </div>

    <h2>Las notas más comunes</h2>

    <div class="divider"></div>

    <div class="aromas">

        <div class="item">
            <img src="img/frutos_rojos.png" alt="Frutos rojos">
            <p>Frutos rojos</p>
        </div>

        <div class="item">
            <img src="img/ciruela.png" alt="Ciruela">
            <p>Ciruela</p>
        </div>

        <div class="item">
            <img src="img/cereza.png" alt="Cereza">
            <p>Cereza</p>
        </div>

        <div class="item">
            <img src="img/frambuesa.png" alt="Frambuesa">
            <p>Frambuesa</p>
        </div>

        <div class="item">
            <img src="img/mora.png" alt="Mora">
            <p>Mora</p>
        </div>

    </div>

</div>

</body>
</html>
