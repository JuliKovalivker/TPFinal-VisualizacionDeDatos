@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.root{background:transparent;font-family:'EB Garamond',Georgia,serif}
.wrap{padding:2rem 1.2rem 2.5rem;max-width:680px;margin:0 auto}
.hd{text-align:center;margin-bottom:0.4rem}
.hd h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#3d1224;line-height:1.3;letter-spacing:0.01em}
.hd .sub{font-style:italic;font-size:13px;color:#7a4a5a;margin-top:3px}
.div{display:flex;align-items:center;gap:8px;width:180px;margin:0.7rem auto 0.5rem}
.div-l{flex:1;height:0.5px;background:#8b3a52;opacity:0.4}
.div-d{width:5px;height:5px;border-radius:50%;background:#8b3a52}
.section-title{text-align:center;font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:#5a2535;margin:0.6rem 0 1rem;letter-spacing:0.04em}
.vine-svg{width:100%;display:block}
.tooltip{position:absolute;background:#faf5f0;border:0.8px solid #8b3a52;border-radius:8px;padding:12px 16px;pointer-events:none;opacity:0;transition:opacity 0.18s;max-width:210px;z-index:10}
.tooltip.on{opacity:1}
.tip-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#3d1224;margin-bottom:1px}
.tip-tipo{font-size:12px;font-style:italic;color:#8b3a52;margin-bottom:7px}
.tip-stat{font-size:13px;color:#5a2535;line-height:1.6}
.tip-stat b{color:#3d1224}
.tip-bar-bg{margin-top:7px;height:3px;background:#e8d5da;border-radius:2px}
.tip-bar{height:100%;border-radius:2px;background:#8b3a52}
.hint{text-align:center;font-size:12px;font-style:italic;color:#9a6070;margin-top:1.2rem}
.legend{display:flex;justify-content:center;gap:22px;margin-top:1rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;font-style:italic;color:#5a2535}
.leg-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid #3d1224}
.vineyard-wrap{position:relative}
</style>

<script>
const DATA={
  gc0:{name:"Malbec",tipo:"Tinto",rank:1,vol:3780000},
  gc1:{name:"Cabernet Sauvignon",tipo:"Tinto",rank:2,vol:1400000},
  gc2:{name:"Bonarda",tipo:"Tinto",rank:3,vol:886000},
  gc3:{name:"Syrah",tipo:"Tinto",rank:4,vol:766000},
  gc4:{name:"Merlot",tipo:"Tinto",rank:5,vol:572000},
  gc5:{name:"Torrontés",tipo:"Blanco",rank:1,vol:552000},
  gc6:{name:"Chardonnay",tipo:"Blanco",rank:2,vol:477000},
  gc7:{name:"Cereza",tipo:"Rosado",rank:1,vol:397000},
  gc8:{name:"Chenin",tipo:"Blanco",rank:3,vol:317000},
};
const MAX=3780000,TOTAL=11283000;
function fmt(n){return n>=1000000?(n/1000000).toFixed(2)+' M hl':(n/1000).toFixed(0)+' K hl'}
const tip=document.getElementById('tip');
const wrap=document.getElementById('vw');
Object.keys(DATA).forEach(id=>{
  const g=document.getElementById(id);
  if(!g)return;
  g.addEventListener('mouseenter',function(){
    const u=DATA[id];
    document.getElementById('tn').textContent=u.name;
    document.getElementById('tt').textContent=u.tipo+' · #'+u.rank+' en su tipo';
    document.getElementById('tv').textContent=fmt(u.vol);
    document.getElementById('tp').textContent=((u.vol/TOTAL)*100).toFixed(1)+'%';
    const bar=document.getElementById('tb');
    bar.style.width=((u.vol/MAX)*100)+'%';
    bar.style.background=u.tipo==='Tinto'?'#5a1a30':u.tipo==='Blanco'?'#8a6010':'#8b3a52';
    const br=this.getBoundingClientRect();
    const wr=wrap.getBoundingClientRect();
    let left=br.left-wr.left+br.width/2-105;
    let top=br.top-wr.top-138;
    if(left<0)left=4;
    if(left+215>wrap.offsetWidth)left=wrap.offsetWidth-218;
    if(top<10)top=br.bottom-wr.top+8;
    tip.style.left=left+'px';
    tip.style.top=top+'px';
    tip.classList.add('on');
  });
  g.addEventListener('mouseleave',()=>tip.classList.remove('on'));
});
</script>
